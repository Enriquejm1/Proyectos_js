<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profeli</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-photo" id="userPhoto">
            </div>
            </div>
            <h2 id="userName">Nombre</h2>
            <p id="userDescripcion">Descripción</p>
            <div class="contact-info">
                <p><strong>Email: </strong><span id="userEmail"> ejemplo@gmail.com</span></p>
                <p><strong>Phone Number:</strong><span id="userphone"></span></p>
            </div>
            <div class="social-links">
                <a href="#" id="githubLink" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="#" id="linkedinLink" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" id="youtubeinLink" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>
        <script src="js/script.js"></script>
</body>
</html>
