<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Musica Online</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Standard-Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../img/computacion_circular_recortada.png">

<body>

    <audio id="audio" controls preload="auto"></audio>
     </div>

    <script src="js/script.js"></script>
</body>
