<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/styles.css">
    <title>Inicio de Sesión</title>
    <!-- Standard-Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../img/computacion_circular_recortada.png">
</head>
<body>
    <div class="container">
        <div class="login-form">
            <div class="logo-container">
                <img src="/Formulario-login/img/LogoCace.jpeg" alt="cace">
            </div>
            <h1>Iniciar Sesión</h1>
            <form id="login-form">
                <div class="input_container">
                    <input type="text" id="username" placeholder="Nombre de alumno">
                </div>
                <div class="input_container">
                    <input type="password" id="password" placeholder="Contraseña">
                </div> <br>
                <button type="submit">Iniciar Sesión</button>
        <div class="success-message" id="success-message"></div>
        <div class="remember-forgot">
            <label>
            <input type="checkbox" id="remember-forgot" >Guardar
            <br><p href="#">¿Olvidaste tu contraseña?</p>
        </label>
        </div>
        <div class="signup-now">
            ¿Nuevo alumnos? <a href="#">Registrarse</a>
        </div>
        </div>
    </div>
<script src="js/script-login.js"></script>
</body>
</html>
